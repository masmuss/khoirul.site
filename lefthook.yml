# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.{ts,tsx,astro}"
      run: bun run check
      stage_fixed: true

    lint:
      glob: "*.{ts,tsx,js,jsx,astro}"
      run: bun run lint
      stage_fixed: true

    format:
      glob: "*.{ts,tsx,js,jsx,astro,css,json,md,mdx}"
      run: bun run format
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    test:unit:
      run: bun run test:unit
      stage_fixed: true

    test:e2e:
      run: bun run test:e2e
      stage_fixed: true

    build:
      run: bun run build
      stage_fixed: true
